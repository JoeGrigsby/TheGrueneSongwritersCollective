<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Gruene Songwriters Collective</title>
  <meta name="description" content="The Gruene Songwriters Collective — Americana, Country &amp; Folk from Gruene, Texas. Est. Summer 2025." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Oswald:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #1a1208; }
    #root { min-height: 100vh; }
    a { color: inherit; }
    button { cursor: pointer; }
    @media (max-width: 768px) {
      .desktop-nav { display: none !important; }
      .hamburger { display: flex !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" src="Home.jsx"></script>
  <script type="text/babel" src="Artists.jsx"></script>
  <script type="text/babel" src="Pages.jsx"></script>

  <script type="text/babel">
    const NAV_LINKS = [
      { label: 'Our Story', page: 'story' },
      { label: 'Artists',   page: 'artists' },
      { label: 'Events',    page: 'events' },
      { label: 'Music',     page: 'music' },
      { label: 'Merch',     page: 'merch' },
      { label: 'Contact',   page: 'contact' },
    ];

    const Navbar = ({ currentPage, navigate, scrolled }) => {
      const [menuOpen, setMenuOpen] = React.useState(false);
      const opaque = scrolled || currentPage !== 'home';
      return (
        <nav style={{
          position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
          background: opaque ? 'rgba(15,8,2,0.97)' : 'rgba(15,8,2,0.65)',
          backdropFilter: 'blur(8px)',
          borderBottom: `1px solid ${opaque ? '#3d2810' : 'transparent'}`,
          transition: 'background 0.3s, border-color 0.3s',
          padding: '0 32px', height: '72px',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        }}>
          <button onClick={() => { navigate('home'); setMenuOpen(false); }} style={{
            background: 'none', border: 'none', cursor: 'pointer', padding: 0,
            display: 'flex', alignItems: 'center', gap: '12px',
          }}>
            <div style={{
              width: '42px', height: '42px', borderRadius: '50%',
              border: '2px solid #c8a45a', background: '#1a1208',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <span style={{ color: '#c8a45a', fontSize: '16px', fontFamily: "'Playfair Display', serif", fontWeight: 700 }}>G</span>
            </div>
            <div style={{ textAlign: 'left' }}>
              <div style={{ fontFamily: "'Playfair Display', serif", color: '#f2ead8', fontSize: '14px', lineHeight: 1.1 }}>The Gruene</div>
              <div style={{ fontFamily: "'Oswald', sans-serif", color: '#c8a45a', fontSize: '10px', letterSpacing: '0.25em', textTransform: 'uppercase' }}>Songwriters Collective</div>
            </div>
          </button>

          <div className="desktop-nav" style={{ display: 'flex', gap: '32px', alignItems: 'center' }}>
            {NAV_LINKS.map(({ label, page }) => (
              <button key={page} onClick={() => navigate(page)} style={{
                background: 'none', border: 'none', cursor: 'pointer', padding: '4px 0',
                fontFamily: "'Oswald', sans-serif", fontSize: '13px',
                letterSpacing: '0.2em', textTransform: 'uppercase',
                color: currentPage === page ? '#c8a45a' : '#d4c4a8',
                borderBottom: currentPage === page ? '1px solid #c8a45a' : '1px solid transparent',
                transition: 'color 0.2s, border-color 0.2s',
              }}>{label}</button>
            ))}
          </div>

          <button
            className="hamburger"
            onClick={() => setMenuOpen(m => !m)}
            style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'none', flexDirection: 'column', gap: '5px', padding: '4px' }}
          >
            {[0,1,2].map(i => <span key={i} style={{ display: 'block', width: '24px', height: '2px', background: '#c8a45a' }} />)}
          </button>

          {menuOpen && (
            <div style={{
              position: 'fixed', top: '72px', left: 0, right: 0,
              background: 'rgba(15,8,2,0.98)', borderBottom: '1px solid #3d2810',
              padding: '16px 0', zIndex: 99,
            }}>
              {NAV_LINKS.map(({ label, page }) => (
                <button key={page} onClick={() => { navigate(page); setMenuOpen(false); }} style={{
                  display: 'block', width: '100%', background: 'none', border: 'none',
                  cursor: 'pointer', padding: '14px 32px', textAlign: 'left',
                  fontFamily: "'Oswald', sans-serif", fontSize: '14px',
                  letterSpacing: '0.2em', textTransform: 'uppercase',
                  color: currentPage === page ? '#c8a45a' : '#d4c4a8',
                  borderLeft: currentPage === page ? '3px solid #c8a45a' : '3px solid transparent',
                }}>{label}</button>
              ))}
            </div>
          )}
        </nav>
      );
    };

    const Footer = ({ navigate }) => (
      <footer style={{ background: '#0f0802', borderTop: '1px solid #3d2810', padding: '48px 32px 32px' }}>
        <div style={{ maxWidth: '1100px', margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: '32px', marginBottom: '40px' }}>
            <div>
              <div style={{ fontFamily: "'Playfair Display', serif", color: '#f2ead8', fontSize: '20px', marginBottom: '8px' }}>The Gruene Songwriters Collective</div>
              <div style={{ fontFamily: "'Oswald', sans-serif", color: '#c8a45a', fontSize: '11px', letterSpacing: '0.25em', textTransform: 'uppercase' }}>Gruene, Texas · Est. Summer 2025</div>
              <div style={{ color: '#5a3a1a', fontSize: '13px', marginTop: '8px', fontStyle: 'italic', fontFamily: "'Crimson Pro', serif" }}>★ Americana ★ Country ★ Folk ★</div>
            </div>
            <div>
              <div style={{ fontFamily: "'Oswald', sans-serif", color: '#c8a45a', fontSize: '11px', letterSpacing: '0.25em', textTransform: 'uppercase', marginBottom: '16px' }}>Navigate</div>
              {NAV_LINKS.map(({ label, page }) => (
                <button key={page} onClick={() => navigate(page)} style={{
                  display: 'block', background: 'none', border: 'none', cursor: 'pointer',
                  padding: '3px 0', fontFamily: "'Crimson Pro', serif",
                  color: '#8b6540', fontSize: '15px', textAlign: 'left',
                }}>{label}</button>
              ))}
            </div>
          </div>
          <div style={{ borderTop: '1px solid #3d2810', paddingTop: '24px', textAlign: 'center', color: '#5a3a1a', fontFamily: "'Oswald', sans-serif", fontSize: '11px', letterSpacing: '0.15em', textTransform: 'uppercase' }}>
            © 2025 The Gruene Songwriters Collective · All Rights Reserved
          </div>
        </div>
      </footer>
    );

    const App = () => {
      const [page, setPage] = React.useState('home');
      const [artistSlug, setArtistSlug] = React.useState(null);
      const [scrolled, setScrolled] = React.useState(false);

      React.useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 60);
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      const navigate = (targetPage, slug = null) => {
        setPage(targetPage);
        setArtistSlug(slug);
        window.scrollTo(0, 0);
      };

      const { HomePage, StoryPage, ArtistsPage, EventsPage, MusicPage, MerchPage, ContactPage } = window;

      const renderPage = () => {
        switch (page) {
          case 'home':    return <HomePage navigate={navigate} headlineFont="Abril Fatface" />;
          case 'story':   return <StoryPage />;
          case 'artists': return <ArtistsPage navigate={navigate} selectedArtistSlug={artistSlug} />;
          case 'events':  return <EventsPage />;
          case 'music':   return <MusicPage />;
          case 'merch':   return <MerchPage />;
          case 'contact': return <ContactPage />;
          default:        return <HomePage navigate={navigate} headlineFont="Abril Fatface" />;
        }
      };

      return (
        <div>
          <Navbar currentPage={page} navigate={navigate} scrolled={scrolled} />
          <main>{renderPage()}</main>
          <Footer navigate={navigate} />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
